AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"

# Reference examples favour readability over strict metrics; the runnable
# scripts are intentionally linear and self-contained.
Metrics:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

# Single quotes read fine inside #{...} and avoid escaping in the examples.
Style/StringLiteralsInInterpolation:
  Enabled: false

# Trailing commas keep multi-line literals easy to diff.
Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: consistent_comma
Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/OneClassPerFile:
  Enabled: false

# Kept for Ruby 3.1 compatibility (Set is autoloaded only on 3.2+).
Lint/RedundantRequireStatement:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Layout/LineLength:
  Max: 110
  Exclude:
    - "tests/**/*"

Naming/FileName:
  Exclude:
    - "checkout-links/*.rb"

Style/RescueModifier:
  Enabled: false
