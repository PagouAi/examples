name: Link check

# Verifies Markdown links across the repo — relative paths to example dirs and
# files, and outbound links to the docs and OpenAPI reference. Runs on PRs that
# touch Markdown and on a weekly schedule to catch links that rot after a doc
# move or a directory rename.
on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"
      - ".github/lychee.toml"
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .github/lychee.toml --no-progress "**/*.md"
          fail: true
