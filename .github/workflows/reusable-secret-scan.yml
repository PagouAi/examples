name: Secret scan

# Reusable secret-scanning gate. Blocks merge when credentials are detected.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks + backstop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .github/gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Repo-specific backstop scan
        run: bash .github/scripts/secret-scan.sh
