name: Secret scan

# Reusable secret-scanning gate. Blocks merge when credentials are detected.
# Uses the license-free open-source gitleaks binary (the gitleaks GitHub Action
# requires a paid GITLEAKS_LICENSE for org repos) plus a repo-specific backstop.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks + backstop)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.18.4
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (open-source, no license)
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: gitleaks detect (filesystem scan)
        run: gitleaks detect --no-git --redact --config .github/gitleaks.toml --exit-code 1 --verbose

      - name: Repo-specific backstop scan
        run: bash .github/scripts/secret-scan.sh
